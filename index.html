<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>🛞 Магазин шин</h2>

<button onclick="load()">Показать товары</button>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const data = [
    {name:"205/55 R16", price:5000},
    {name:"215/60 R17", price:6200}
];

function load(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(i=>{
        list.innerHTML += `<div>${i.name} — ${i.price}₽</div>`;
    });
}
</script>

</body>
</html>
